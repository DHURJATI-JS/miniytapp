{% extends 'base.html' %}

{% block title %}Error (500){% endblock title %}

{% block body %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-6 text-center">
            <div class="mb-4">
                <span class="display-1 fw-bold text-primary opacity-25" style="letter-spacing: -5px;">500</span>
            </div>
            
            <div class="mb-5">
                <h2 class="fw-bold mb-3">Lost in the sauce?</h2>
                <p class="text-muted">
                    The page you are looking for might have been removed, 
                    had its name changed, or is temporarily unavailable.
                </p>
            </div>

            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg rounded-pill px-5 shadow-0">
                    <i class="fas fa-home me-2"></i> Take Me Home
                </a>
                
            </div>
        </div>
    </div>
</div>

<style  nonce="{{ csp_nonce() }}">
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }
    .display-1 {
        animation: float 4s ease-in-out infinite;
        display: inline-block;
    }
</style>
{% endblock body %}
