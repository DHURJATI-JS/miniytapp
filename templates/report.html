{% extends "base.html" %}
{% block title %}Report {{ target_user.name }}{% endblock title %}
{% block body %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-11">
            <div class="card border-0 shadow-sm rounded-4">
                
                <div class="card-header bg-white pt-4 pb-2 border-0 text-center">
                    <h2 class="fw-bold" style="color: #4f4f4f;">Submit a Report</h2>
                    <p class="text-muted">Help us maintain a high-quality community environment.</p>
                    <hr class="mx-auto" style="width: 50px; height: 3px; background-color: #3b71ca; border: none; opacity: 1;">
                </div>

                <div class="card-body p-4 p-md-5">
                    
                    <div class="d-flex align-items-center mb-5 p-4 rounded-4" style="background-color: #f8fbff; border: 1px solid #e3f2fd;">
                        <img src="{{ url_for('static', filename='profilephotos/' + target_user.profilephoto) }}" 
                             class="rounded-circle shadow-sm border border-white" 
                             width="80" height="80" 
                             style="object-fit: cover;"
                             alt="User">
                        <div class="ms-4">
                            <p>Reporting user:</p>
                            <a href="{{url_for('viewprofile',userid=target_user.id)}}"><p class="mb-0 fw-bold text-muted">@{{ target_user.name or 'user' }}</p></a>
                        </div>
                    </div>

                    <form action="{{ url_for('reportbp.report', id=target_user.id) }}" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        
                        <div class="row">
                            <div class="col-md-12 mb-4">
                                <label class="form-label fw-bold" style="color: #4f4f4f;">Violation Category</label>
                                <select class="form-select studio-input" name="reason" required>
                                    <option value="" selected disabled>Select a reason...</option>
                                    <option value="Harassment">Harassment or Bullying</option>
                                    <option value="Spam">Spam or Scams</option>
                                    <option value="Inappropriate Content">Inappropriate Content</option>
                                    <option value="Impersonation">Impersonation</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div class="col-md-12 mb-4">
                                <label class="form-label fw-bold" style="color: #4f4f4f;">Additional Details</label>
                                <textarea class="form-control studio-input" 
                                          name="details" 
                                          rows="8" 
                                          minlength="20"
                                          maxlength="500"
                                          placeholder="Please provide details about the violation or links as evidence..." 
                                          required></textarea>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end align-items-center gap-3 mt-4">
                            <button onclick="backk()" 
                               class="btn btn-light fw-bold me-3">Cancel</button>
                            
                            <button type="submit" class="btn btn-primary btn-lg px-5 rounded-pill shadow-0" 
                                    style="background-color: #3b71ca; text-transform: none; font-weight: 600;">
                                Submit Report
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style nonce="{{ csp_nonce() }}">
    /* Premium Studio Input Styling - Matching your other forms */
    .studio-input {
        background-color: #ffffff !important;
        border: 1px solid #ced4da !important;
        border-radius: 10px !important;
        padding: 12px 15px;
        transition: all 0.2s ease;
        color: #4f4f4f;
    }

    .studio-input:focus {
        border-color: #3b71ca !important;
        box-shadow: 0 0 0 0.2rem rgba(59, 113, 202, 0.1) !important;
        outline: 0;
    }

    /* Large Textarea tweaks */
    textarea.studio-input {
        resize: none;
    }

    /* Overall page feel */
    body {
        background-color: #f4f7f6; /* Soft light gray, typical for premium apps */
    }

    .rounded-4 {
        border-radius: 1.2rem !important;
    }
</style>
{% endblock %}
