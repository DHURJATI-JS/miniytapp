{% extends 'base.html' %}
{% block title %}Upload Video{% endblock title %}

{% block body %}
<style nonce="{{ csp_nonce() }}">
    .upload-suite .upload-card { border: none; border-radius: 16px; transition: 0.3s; }
    .upload-suite .drop-zone {
        border: 2px dashed #d1d1d1;
        border-radius: 12px;
        padding: 40px 20px;
        text-align: center;
        background: #fdfdfd;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    .upload-suite .drop-zone:hover { border-color: #1266f1; background: #f0f7ff; }
    .upload-suite .video-preview-box { 
        display: none; 
        width: 100%; 
        border-radius: 12px; 
        margin-bottom: 20px; 
        background: #000;
    }
    .upload-suite .form-label { font-weight: 600; color: #4f4f4f; font-size: 0.9rem; }
    .upload-suite .custom-input { background: #f8f9fa !important; border: 1px solid #ddd !important; }
    .upload-suite .custom-input:focus { border-color: #1266f1 !important; box-shadow: none; }
</style>
<div class="container py-5 upload-suite">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark">Upload New Content</h2>
                <p class="text-muted">Fill in the details below to share your video.</p>
            </div>
            <form action="/upload/{{ request.view_args['id'] }}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="card upload-card shadow-sm mb-5">
                    <div class="card-body p-4">
                        <div class="drop-zone mb-4" id="drop-zone-trigger">
                            <i class="fas fa-cloud-upload-alt fa-3x text-primary mb-3"></i>
                            <h5 class="fw-bold" id="file-label">Select Video File*</h5>
                            <p class="text-muted small mb-0">Drag and drop or click to browse</p>
                            <input name="video" required type="file" id="videoFile" class="d-none" accept="video/*">
                        </div>
                        <video id="video-preview" controls class="video-preview-box shadow-sm"></video>
                        <div class="row g-4">
                           <div class="col-md-12">
    <label class="form-label" for="d">Thumbnail Image*</label>
    <input type="file" class="form-control custom-input form-control-lg" id="d" accept="image/*" required name="thumbnail" />
    
    <div id="thumb-preview-container" class="mt-3 d-none">
        <p class="text-muted small mb-2">Thumbnail Preview:</p>
        <img id="thumb-preview-img" src="" class="img-fluid rounded border shadow-sm" style="max-height: 180px;">
    </div>
</div>
                            <div class="col-md-12">
                                <label class="form-label" for="xx">Video Title*</label>
                                <input type="text" name="name" id="xx" required minlength="10" maxlength="40" class="form-control custom-input form-control-lg" placeholder="Enter a descriptive title">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label" for="yy">Description*</label>
                                <textarea class="form-control custom-input" id="yy" name="desc" required minlength="30" maxlength="300" rows="4" placeholder="Tell viewers about your video"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="ccc">Category*</label>
                                <select class="form-select custom-input" id="ccc" name="category">
                                    {% for x in categories %}
                                      <option value="{{x}}">{{x}}</option> 
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                    <label class="form-label" for="vis-select">Visibility*</label>
                        <select class="form-select custom-input" required name="privacy" id="vis-select">
                            <option value="1" 
                                selected
                            >🌐 Public</option>
                            <option value="0"
                                
                            >🔒 Private</option>
                        </select>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-light p-4 border-top-0 d-flex justify-content-between align-items-center rounded-bottom">
                        <span class="text-muted small"><i class="fas fa-info-circle me-1"></i> Max size: 500MB</span>
                        <button type="submit" class="btn btn-primary btn-lg px-5 rounded-pill fw-bold shadow-0">Publish Video</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script nonce="{{ csp_nonce() }}">
    (function() {
        const suite = document.querySelector('.upload-suite');
        const videoInput = suite.querySelector('#videoFile');
        const trigger = suite.querySelector('#drop-zone-trigger');
        const fileLabel = suite.querySelector('#file-label');
        const preview = suite.querySelector('#video-preview');
        const thumbInput = suite.querySelector('#d');
        const thumbContainer = suite.querySelector('#thumb-preview-container');
        const thumbImg = suite.querySelector('#thumb-preview-img');
        trigger.addEventListener('click', () => videoInput.click());
        videoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                fileLabel.innerText = file.name;
                const url = URL.createObjectURL(file);
                preview.src = url;
                preview.style.display = 'block';
                trigger.style.borderColor = '#1266f1';
                trigger.style.background = '#f0f7ff';
            }
        });
        thumbInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                thumbImg.src = url;
                thumbContainer.classList.remove('d-none');
            } else {
                thumbContainer.classList.add('d-none');
            }
        });
    })();
</script>

{% endblock body %}
